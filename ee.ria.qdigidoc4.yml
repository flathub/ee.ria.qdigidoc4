app-id: ee.ria.qdigidoc4
command: run.sh
runtime: org.kde.Platform
runtime-version: '6.9'
sdk: org.kde.Sdk
rename-icon: qdigidoc4
rename-mime-file: qdigidoc4.xml
rename-mime-icons: ["application-x-cdoc","application-vnd.etsi.asic-e+zip"]

finish-args:
  # libdigidocpp stores tsl files here
  - --persist=.digidocpp
  # Network is needed for some parts of the application's functionality
  - --share=network
  # Wayland
  - --socket=wayland
  # X11
  - --socket=fallback-x11
  - --share=ipc
  # Smartcard
  - --socket=pcsc
  - --device=all
  - --filesystem=home

cleanup:
  - /include
  - /lib/cmake
  - /lib/pkgconfig
  - /etc/bash_completion.d
  - /share/doc
  - /share/man

modules:
  - name: flatbuffers
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: https://github.com/google/flatbuffers/archive/refs/tags/v25.12.19.tar.gz
        sha256: f81c3162b1046fe8b84b9a0dbdd383e24fdbcf88583b9cb6028f90d04d90696a

  - name: xmlsec
    buildsystem: autotools
    sources:
      - type: archive
        url: https://github.com/lsh123/xmlsec/archive/refs/tags/1.3.9.tar.gz
        sha256: 534f50743b2fa3ebf3c05917a293c73f255c823dd0285f02622260084317c605
      - type: patch
        paths:
          - xmlsec/xmlsec1-1.3.5.legacy.patch

  - name: libdigidocpp
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: https://github.com/open-eid/libdigidocpp/archive/refs/tags/v4.3.0.tar.gz
        sha256: d728d15298a7548f9f481ad746dd0961c9cfd1f7130c3b83f5d89a8eab7cd75d

  - name: openldap
    buildsystem: autotools
    config-opts:
      - --disable-backends
      - --disable-overlays
      - --disable-slapd
      - --disable-debug
      - --enable-dynamic
      - --without-threads
      - --with-tls=gnutls
    cleanup:
      - /bin
      - /share/man
    sources:
      - type: archive
        url: https://www.openldap.org/software/download/OpenLDAP/openldap-release/openldap-2.6.10.tgz
        sha256: c065f04aad42737aebd60b2fe4939704ac844266bc0aeaa1609f0cad987be516
      - type: script
        dest-filename: autogen.sh
        commands:
          - AUTOMAKE=/bin/true autoreconf -vfi

  - shared-modules/libusb/libusb.json

  - name: pcsc-lite
    config-opts:
      - --disable-libudev
      - --disable-libsystemd
      - --without-systemdsystemunitdir
      - --disable-serial
      - --disable-usb
      - --disable-documentation
      - --disable-polkit
    cleanup:
      - /sbin
    sources:
      - type: archive
        url: https://github.com/LudovicRousseau/PCSC/archive/refs/tags/2.4.1.tar.gz
        sha256: e7b6737f68c3b9a763fb0b0370d899cea091cced9d762ca8a6032c959576d5be

  - name: opensc
    cleanup:
      - /share/applications/org.opensc.notify.desktop
    sources:
      - type: archive
        url: https://github.com/OpenSC/OpenSC/archive/refs/tags/0.26.1.tar.gz
        sha256: 5c4928bac2786dcaff9b2dfa43cd3de301bd137193a57adfb1a7a555656691ce
      # Patches by RIA to support the EstEID 2018 and 2025 cards, 
      # From:  https://installer.id.ee/media/ubuntu/pool/main/o/opensc/opensc_0.26.1-1RIA3.debian.tar.xz
      - type: patch
        paths:
          - opensc/0001-Use-sysconfdir-opensc-for-opensc.conf.patch
          - opensc/0002-Drop-non-functional-ENABLE_AUTOSTART.patch
          - opensc/0003-esteid2025.patch
          - opensc/0004-esteid2018.patch
          - opensc/0005-fix-pkcs11-register.patch

  - name: qdigidoc4
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: https://github.com/open-eid/DigiDoc4-Client/releases/download/v4.9.1/qdigidoc4-4.9.1.tar.gz
        sha256: 3251616682faa24bb577a492cb206ed84bb79df1002fccec80026a026502f408
      - type: patch
        path: qdigidoc4/QPKCS11.patch
      - type: file
        path: ee.ria.qdigidoc4.metainfo.xml
      # See guide for building in a sandboxed environment:
      # https://github.com/open-eid/DigiDoc4-Client/wiki/DeveloperTips#building-in-sandboxed-environment
      - type: file
        url: https://ec.europa.eu/tools/lotl/eu-lotl.xml
        sha256: e00b942e38fa340e4631aa7cacf9f528fc917441008f20e71b2670da45833df1
        dest: client
        dest-filename: eu-lotl.xml
      - type: file
        url: https://sr.riik.ee/tsl/estonian-tsl.xml
        sha256: 3b3c37197bd3e717ab4a18ea50a3a73abe3afe6a6d624232d1a8927ec6f8b786
        dest: client
        dest-filename: EE.xml
      - type: file
        url: https://id.eesti.ee/config.json
        sha256: 5d17d30ccd52e869f988e56d06d71d4f972078a43d21e3498c9d48cf94565aa0
        dest: common
        dest-filename: config.json
      - type: file
        url: https://id.eesti.ee/config.rsa
        sha256: 1ac49d69dc2f6ef675d04c088e86de99e70c220e081acffcffa3e97bb525b941
        dest: common
        dest-filename: config.rsa
      - type: file
        url: https://id.eesti.ee/config.pub
        sha256: 29e05778ce98b5197963266bdc292af80a9406cccc3fe5ef7ca2b75b1beb34eb
        dest: common
        dest-filename: config.pub
      # qdigidoc4 saves files in $TMPDIR before opening them. Since this is inaccessible, we provide a wrapper script,
      # as advised here: https://docs.flatpak.org/en/latest/sandbox-permissions.html#filesystem-access
      - type: script
        dest-filename: run.sh
        commands:
          - env TMPDIR="$XDG_RUNTIME_DIR/app/$FLATPAK_ID" qdigidoc4 "$@"
    post-install:
      - install run.sh "${FLATPAK_DEST}/bin/run.sh"
      - install -Dm644 ee.ria.qdigidoc4.metainfo.xml $FLATPAK_DEST/share/metainfo/ee.ria.qdigidoc4.metainfo.xml
      - ln -s $FLATPAK_DEST/share/locale/et/LC_MESSAGES/nautilus-qdigidoc.mo $FLATPAK_DEST/share/locale/et/nautilus-qdigidoc.mo
      - ln -s $FLATPAK_DEST/share/locale/ru/LC_MESSAGES/nautilus-qdigidoc.mo $FLATPAK_DEST/share/locale/ru/nautilus-qdigidoc.mo
      - desktop-file-edit --set-key=Exec --set-value="run.sh" /app/share/applications/ee.ria.qdigidoc4.desktop
